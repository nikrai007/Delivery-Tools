{# Release Tracker — shared presentational macros (platform design system). #}

{% macro page_header(title, subtitle, icon="rocket_launch") %}
  <div class="flex items-start gap-4">
    <div class="h-12 w-12 shrink-0 rounded-2xl bg-gradient-to-br from-brand-500 to-brand-700 text-white
                flex items-center justify-center shadow-lg shadow-brand-500/25">
      <span class="material-symbols-outlined text-[26px]">{{ icon }}</span>
    </div>
    <div class="min-w-0">
      <h2 class="text-xl font-semibold tracking-tight text-zinc-900 dark:text-zinc-50">{{ title }}</h2>
      {% if subtitle %}<p class="text-sm text-zinc-500 dark:text-zinc-400 mt-0.5">{{ subtitle }}</p>{% endif %}
    </div>
  </div>
{% endmacro %}

{% macro toolbar_btn(label, icon, extra="") %}
  <button type="button" {{ extra|safe }}
          class="inline-flex items-center gap-2 px-3.5 py-2 rounded-xl text-sm font-medium
                 border border-zinc-200 dark:border-zinc-700 bg-white dark:bg-zinc-900
                 text-zinc-700 dark:text-zinc-200 hover:border-brand-400 hover:text-brand-600
                 dark:hover:text-brand-300 shadow-sm transition-colors">
    <span class="material-symbols-outlined text-[18px]">{{ icon }}</span>{{ label }}
  </button>
{% endmacro %}
