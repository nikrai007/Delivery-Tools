{% extends "base.html" %}
{% block title %}Forgot password · {{ platform_name }}{% endblock %}

{% block content_auth %}
<div class="flex flex-col items-center gap-8">
  <header class="relative flex flex-col items-center gap-3">
    <div class="logo-glow"></div>
    <img src="{{ url_for('static', filename='logo.svg') }}" alt="" class="relative h-14 w-14 rounded-2xl shadow-lg shadow-brand-500/25">
    <h1 class="text-2xl font-bold tracking-tight bg-gradient-to-r from-brand-500 to-brand-800 dark:from-brand-200 dark:to-brand-400 bg-clip-text text-transparent">Forgot your password?</h1>
    <p class="text-xs text-zinc-500 dark:text-zinc-400 text-center max-w-sm">Enter your username or email and we'll send a password-reset link.</p>
  </header>

  <section class="glass-card shimmer-sweep w-full p-7 rounded-2xl flex flex-col gap-5">
    <form method="post" class="flex flex-col gap-5">
      <div class="flex flex-col gap-1.5">
        <label class="text-[11px] font-semibold uppercase tracking-widest text-zinc-500 dark:text-zinc-400 ml-1" for="identifier">Username or email</label>
        <div class="input-glow relative flex items-center bg-zinc-100/60 dark:bg-zinc-800/40 rounded-xl border border-zinc-200/80 dark:border-white/5">
          <span class="material-symbols-outlined absolute left-4 text-zinc-400 text-[20px]">account_circle</span>
          <input id="identifier" name="identifier" type="text" required autofocus
                 class="w-full bg-transparent border-none py-3.5 pl-12 pr-4 text-sm font-mono placeholder:text-zinc-400 focus:ring-0 focus:outline-none">
        </div>
      </div>

      <button type="submit"
              class="btn-sheen w-full py-3.5 rounded-xl bg-gradient-to-b from-brand-500 to-brand-700 text-white font-semibold text-sm tracking-wide shadow-lg shadow-brand-500/25 hover:-translate-y-0.5 transition-all active:scale-[0.98]">
        Send reset link
      </button>
    </form>
    <div class="text-center">
      <a class="text-xs font-semibold text-brand-600 hover:text-brand-700 dark:text-brand-300 dark:hover:text-brand-200" href="{{ url_for('auth.login') }}">← Back to sign in</a>
    </div>
  </section>
</div>
{% endblock %}
