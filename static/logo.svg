<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48" role="img" aria-label="AutoBackupRevert logo">
  <defs>
    <linearGradient id="abrTile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
    <linearGradient id="abrSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Tile -->
  <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="url(#abrTile)"/>
  <rect x="0" y="0" width="48" height="48" rx="12" ry="12" fill="url(#abrSheen)"/>

  <!-- Stack of two snapshot "cards" (back / front) -->
  <rect x="14" y="13" width="22" height="14" rx="3" ry="3"
        fill="#ffffff" fill-opacity="0.22"/>
  <rect x="11" y="17" width="22" height="14" rx="3" ry="3"
        fill="#ffffff" fill-opacity="0.95"/>
  <!-- Three "data lines" inside the front card -->
  <rect x="14" y="20" width="14" height="1.6" rx="0.8" fill="#4338ca" fill-opacity="0.85"/>
  <rect x="14" y="23" width="11" height="1.6" rx="0.8" fill="#4338ca" fill-opacity="0.55"/>
  <rect x="14" y="26" width="13" height="1.6" rx="0.8" fill="#4338ca" fill-opacity="0.55"/>

  <!-- Counter-clockwise rewind arc wrapping around the cards (signals "revert") -->
  <path d="M 35.2 36 A 11 11 0 1 1 39 24"
        fill="none" stroke="#ffffff" stroke-width="2.6" stroke-linecap="round"/>
  <!-- Arrowhead at the end of the arc -->
  <path d="M 39 24 L 36.2 21.8 M 39 24 L 41.7 26.6"
        stroke="#ffffff" stroke-width="2.6" stroke-linecap="round" fill="none"/>
</svg>
